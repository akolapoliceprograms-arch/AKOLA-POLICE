<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akola Police | Certificate Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-light: #3b82f6;
      --primary-dark: #1e40af;
      --secondary: #eab308;
      --accent: #ef4444;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.75);
      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url(./athlete-silhouette-marathon-h2u2efp37ylfcv9f.jpg) no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
    }

    .ambient-glow-1,
    .ambient-glow-2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: pulse-slow 8s infinite alternate ease-in-out;
      pointer-events: none;
    }

    .ambient-glow-1 {
      top: -10%;
      left: 10%;
      width: 400px;
      height: 400px;
      background: rgba(59, 130, 246, 0.3);
    }

    .ambient-glow-2 {
      bottom: -10%;
      right: 10%;
      width: 500px;
      height: 500px;
      background: rgba(234, 179, 8, 0.2);
      animation-delay: 2s;
    }

    .form-container {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      padding: 3.5rem 2.5rem;
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 650px;
      text-align: center;
      animation: slide-up .8s cubic-bezier(.16, 1, .3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      border-radius: 24px 24px 0 0;
    }

    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
      filter: blur(15px);
      z-index: -1;
      opacity: 0.6;
      animation: breathe 3s infinite ease-in-out;
    }

    .logo {
      width: 75px;
      height: 75px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
      transition: transform .3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .header-title-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 1rem;
    }

    .header-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .header-subtitle {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--secondary);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 0.2rem;
      opacity: 0.9;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: .5rem 0 .75rem;
      color: #f8fafc;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    p {
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .input-group {
      position: relative;
      margin-bottom: 2rem;
      max-width: 450px;
      margin: auto;
    }

    input[type="text"] {
      width: 100%;
      padding: 18px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      transition: all .3s ease;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-light);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .btn-container {
      position: relative;
      display: inline-block;
      margin-top: 30px;
      /* move button down */
    }

    button {
      position: relative;
      padding: 16px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-dark) 100%);
      box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all .3s cubic-bezier(.25, .8, .25, 1);
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: skewX(-20deg);
      animation: shine 3s infinite;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(30, 64, 175, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      background: linear-gradient(135deg, #60a5fa 0%, var(--primary) 100%);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(30, 64, 175, 0.4);
    }

    .button-icon {
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .footer-text {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
    }

    @keyframes slide-up {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(.98);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse-slow {
      0% {
        transform: scale(1);
        opacity: .4;
      }

      100% {
        transform: scale(1.1);
        opacity: .6;
      }
    }

    @keyframes breathe {
      0% {
        opacity: .5;
        transform: scale(.95);
      }

      50% {
        opacity: .8;
        transform: scale(1.05);
      }

      100% {
        opacity: .5;
        transform: scale(.95);
      }
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      20% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    @media (max-width:600px) {
      .form-container {
        padding: 2.5rem 1.5rem;
      }

      .header-title {
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      .header-subtitle {
        font-size: 0.65rem;
        letter-spacing: 2px;
      }

      .logo {
        width: 50px;
        height: 50px;
      }

      h2 {
        font-size: 1.3rem;
      }
    }

    /* Celebration canvas overlay */
    #celebrationCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

<body>
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>
  <div class="form-container">
    <div class="form-header">
      <div class="logo-container">
        <div class="logo-glow"></div>
        <img src="./AkolaPolice Logo.png" alt="Akola Police Logo" class="logo" />
      </div>
      <div class="header-title-container">
        <h1 class="header-title">Akola Police</h1>
        <div class="header-subtitle">Mission Udan</div>
      </div>
      <div class="logo-container">
        <div class="logo-glow"></div>
        <img src="./WhatsApp_Image_2025-10-29_at_2.16.15_PM-removebg-preview.png" alt="Mission Udan Logo"
          class="logo" />
      </div>
    </div>
    <h2>अकोला पोलीस मिशन उडान कायदेविषयक जनजागृती अभियान</h2>
    <p>Honor your participation by generating your official completion certificate. Enter your full name below to
      download.</p>
    <div class="input-group">
      <input type="text" id="username" placeholder="Enter your full name here..." autocomplete="off" />
    </div>
    <div class="btn-container">
      <button id="downloadBtn">
        <svg class="button-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Generate &amp; Download
      </button>
    </div>
  </div>
  <div class="footer-text">© 2024 Akola Police. All rights reserved.</div>
  <canvas id="certificateCanvas" width="1123" height="794" style="display:none;"></canvas>
  <script>
    const canvas = document.getElementById("certificateCanvas");
    const ctx = canvas.getContext("2d");
    const bgImage = new Image();
    bgImage.src = "Raising Day.jpeg";
    bgImage.crossOrigin = "anonymous";
    const downloadBtn = document.getElementById("downloadBtn");
    const usernameInput = document.getElementById("username");
    usernameInput.addEventListener("keypress", e => { if (e.key === "Enter") { e.preventDefault(); downloadBtn.click(); } });
    downloadBtn.addEventListener("click", () => {
      const name = usernameInput.value.trim();
      if (!name) {
        usernameInput.style.borderColor = "#ef4444";
        usernameInput.style.animation = "shake 0.5s ease-in-out";
        if (!document.getElementById('shake-anim')) {
          const style = document.createElement('style');
          style.id = 'shake-anim';
          style.innerHTML = `@keyframes shake {0%,100%{transform:translateX(0);}10%,30%,50%,70%,90%{transform:translateX(-5px);}20%,40%,60%,80%{transform:translateX(5px);}}`;
          document.head.appendChild(style);
        }
        setTimeout(() => { usernameInput.style.animation = ""; usernameInput.style.borderColor = "rgba(255,255,255,0.1)"; }, 500);
        return;
      }
      usernameInput.style.borderColor = "rgba(255,255,255,0.1)";
      const originalHTML = downloadBtn.innerHTML;
      downloadBtn.innerHTML = `<svg class="button-icon" style="animation:spin 1s linear infinite;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>Processing...`;
      if (!document.getElementById('spin-anim')) {
        const style = document.createElement('style');
        style.id = 'spin-anim';
        style.innerHTML = '@keyframes spin {100% {transform: rotate(360deg);}}';
        document.head.appendChild(style);
      }
      const finish = () => {
        drawAndDownload(name);
        setTimeout(() => { downloadBtn.innerHTML = originalHTML; }, 500);
      };
      if (bgImage.complete) finish(); else bgImage.onload = finish;
    });
    function drawAndDownload(name) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      const formattedName = name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
      ctx.font = "bold 40px 'Inter', Serif";
      ctx.fillStyle = "#8d0000";
      ctx.textAlign = "center";
      ctx.fillText(formattedName, canvas.width / 1.9, 300);
      const link = document.createElement('a');
      link.download = `${formattedName}_Certificate.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      // Trigger celebration effect
      showCelebration();
      // Auto-reload after celebration
      setTimeout(() => {
        location.reload();
      }, 2000);
    }
    // Celebration function
    function showCelebration() {
      const canvas = document.createElement('canvas');
      canvas.id = 'celebrationCanvas';
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const particles = [];
      const colors = ['#ff0', '#f0f', '#0ff', '#ff8c00', '#ff1493'];
      const width = canvas.width = window.innerWidth;
      const height = canvas.height = window.innerHeight;
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height - height,
          size: Math.random() * 6 + 4,
          speed: Math.random() * 3 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360
        });
      }
      function render() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
          p.y += p.speed;
          if (p.y > height) {
            p.y = -p.size;
            p.x = Math.random() * width;
          }
        });
        requestAnimationFrame(render);
      }
      render();
      // Remove after 1.5 seconds
      setTimeout(() => {
        canvas.remove();
      }, 1500);
    }
  </script>
</body>

</html>
